<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- JS links -->
    <script defer src="js/content.js"></script>
    <script defer src="js/map.js"></script>
    <script defer src="script.js"></script>

    <!-- CSS link -->
    <link rel="stylesheet" href="styles.css" type="text/css" />

    <title>[* FN5GL leaderboard test *]</title>
  </head>

  <body>
    <div class="tsw-fn5gl-container">
      <!-- State info modal -->
      <div class="tsw-modal-overlay"></div>
      <dialog class="tsw-modal" tabindex="-1">
        <button class="tsw-modal-close" aria-label="Close">
          <svg>
            <use href="#tsw-modal-close-svg"></use>
          </svg>
        </button>
        <div class="tsw-modal-main">
          <!-- JS injects modal content here -->
        </div>
      </dialog>

      <!-- Leaderboard -->
      <div class="tsw-fn5gl-leaderboard">
        <div class="tsw-fn5gl-tablist fade-item" role="tablist" aria-label="Friday Night Lights 5G High School regions">
          <!-- Tabs will be added to this container -->
        </div>

        <div class="tsw-fn5gl-leaderboard-data">
          <div class="tsw-fn5gl-intro fade-item">
            <!-- JS injects intro content here -->
          </div>

          <div class="tsw-fn5gl-leaderboard-regions-container fade-item">
            <div class="tsw-fn5gl-leaderboard-regions fade-item">
              <!-- Leaderboard content will be added to this container -->
            </div>
            <div class="tsw-fn5gl-loader fade-item">
              <svg>
                <use href="#tsw-fn5gl-loader-svg" />
              </svg>
            </div>
          </div>
          <div class="tsw-fn5gl-usa-map-container">
            <div class="tsw-fn5gl-usa-map fade-item">
              <!-- USA map will be added to this container -->
            </div>
            <div class="tsw-fn5gl-usa-map-stats fade-item hidden">
              <!-- USA map stats will be added to these containers -->
              <div class="tsw-fn5gl-usa-map-stats-box">
                <div class="tsw-fn5gl-usa-map-stats-box-stat">&#160;</div>
                <div class="tsw-fn5gl-usa-map-stats-box-text">&#160;</div>
              </div>
              <div class="tsw-fn5gl-usa-map-stats-box">
                <div class="tsw-fn5gl-usa-map-stats-box-stat">&#160;</div>
                <div class="tsw-fn5gl-usa-map-stats-box-text">&#160;</div>
              </div>
            </div>
            <div class="tsw-tooltip">
              <!-- JS injects state name here -->
            </div>
            <div class="tsw-fn5gl-loader fade-item">
              <svg>
                <use href="#tsw-fn5gl-loader-svg" />
              </svg>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- SVG icons -->
    <div class="tsw-fn5gl-svg-icons">
      <svg id="tsw-fn5gl-loader-svg" xmlns="http://w3.org" width="51" height="51" viewBox="0 0 51 51" fill="none">
        <circle cx="25.5" cy="25.5" r="24" stroke="#414141" stroke-width="3" fill="none" />
        <path
          d="M25.5 1.5C32.608 1.5 38.9943 4.59 43.3889 9.5"
          stroke="#FF52A3"
          stroke-width="4"
          stroke-linecap="round"
        />
      </svg>
      <svg id="tsw-modal-close-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
        <path d="m336-280-56-56 144-144-144-143 56-56 144 144 143-144 56 56-144 143 144 144-56 56-143-144-144 144Z" />
      </svg>
    </div>
  </body>
</html>
