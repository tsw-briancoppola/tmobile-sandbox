<div class="tsw-fn5gl-container">
  <div class="tsw-fn5gl-leaderboard">
    <div class="tsw-fn5gl-tablist-container">
      <div class="tsw-fn5gl-tablist fade-item" role="tablist" aria-label="Friday Night Lights 5G High School regions">
        <!-- Tabs will be added to this container -->
      </div>
    </div>

    <div class="tsw-fn5gl-leaderboard-data">
      <div class="tsw-fn5gl-leaderboard-regions-container">
        <div class="tsw-fn5gl-leaderboard-regions fade-item">
          <!-- Leaderboard content will be added to this container -->
        </div>
        <div class="tsw-fn5gl-loader fade-item">
          <svg>
            <use xlink:href="#tsw-fn5gl-loader-svg" />
          </svg>
        </div>
      </div>
      <div class="tsw-fn5gl-usa-map-container">
        <div class="tsw-fn5gl-usa-map fade-item">
          <!-- USA map will be added to this container -->
        </div>
        <div class="tsw-tooltip">
          <!-- JS injects state name here -->
        </div>
        <div class="tsw-fn5gl-loader fade-item">
          <svg>
            <use xlink:href="#tsw-fn5gl-loader-svg" />
          </svg>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="tsw-fn5gl-svg-icons">
  <svg id="tsw-fn5gl-loader-svg" xmlns="http://w3.org" width="51" height="51" viewBox="0 0 51 51" fill="none">
    <circle cx="25.5" cy="25.5" r="24" stroke="#414141" stroke-width="3" fill="none" />
    <path d="M25.5 1.5C32.608 1.5 38.9943 4.59 43.3889 9.5" stroke="#FF52A3" stroke-width="4" stroke-linecap="round" />
  </svg>
</div>
