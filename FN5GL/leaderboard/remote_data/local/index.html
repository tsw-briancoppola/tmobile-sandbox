<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- JS link -->
    <script defer src="script.js"></script>
    <!-- CSS link -->
    <link rel="stylesheet" href="styles.css" type="text/css" />
    <title>[* FN5GL leaderboard test *]</title>
  </head>

  <body>
    <div class="tsw-fn5gl-container">
      <div class="tsw-fn5gl-leaderboard fade-item">
        <!-- Leaderboard content adds to this container -->
      </div>
      <div class="tsw-fn5gl-brackets">
        <!-- Bracket content adds to this container -->
      </div>
      <div class="tsw-fn5gl-loader fade-item">
        <svg>
          <use xlink:href="#tsw-fn5gl-loader-svg" />
        </svg>
      </div>
    </div>

    <div class="tsw-fn5gl-svg-icons">
      <svg id="tsw-fn5gl-loader-svg" xmlns="http://w3.org" width="51" height="51" viewBox="0 0 51 51" fill="none">
        <circle cx="25.5" cy="25.5" r="24" stroke="#414141" stroke-width="3" fill="none" />
        <path
          d="M25.5 1.5C32.608 1.5 38.9943 4.59 43.3889 9.5"
          stroke="#FF52A3"
          stroke-width="4"
          stroke-linecap="round"
        />
      </svg>
    </div>
  </body>
</html>
